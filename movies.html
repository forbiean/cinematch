<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影库 — CineMatch</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./index.html">
          <div class="brand-mark">C</div>
          CineMatch
        </a>
        <ul class="nav-links">
          <li><a href="./index.html">首页</a></li>
          <li><a href="./movies.html" class="active">电影</a></li>
          <li><a href="./recommendations.html">推荐</a></li>
          <li><a href="./profile.html">我的</a></li>
          <li><a href="./admin.html">后台</a></li>
        </ul>
        <div class="nav-user">
          <a href="./login.html" class="btn btn-ghost btn-sm">登录</a>
          <a href="./profile.html" class="avatar">L</a>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div style="padding: 40px 0 24px;">
        <h1 class="section-title">电影库</h1>
        <p class="section-sub">浏览、搜索和筛选你感兴趣的影片</p>
      </div>

      <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 24px;">
        <div class="search-bar" style="flex: 1; min-width: 260px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted); flex-shrink: 0;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="搜索电影名称、导演、演员..." id="movie-search" oninput="handleSearch(this.value)">
        </div>
        <select id="sort-select" onchange="handleSort(this.value)" style="background: var(--bg-elevated); border: 1px solid var(--border-subtle); color: var(--text-primary); padding: 10px 16px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; outline: none; cursor: pointer;">
          <option value="rating">按评分排序</option>
          <option value="year">按年份排序</option>
          <option value="title">按名称排序</option>
        </select>
      </div>

      <div class="filter-row" id="genre-filters">
        <button class="chip active" data-filter="all" onclick="setGenre('all')">全部</button>
        <button class="chip" data-filter="科幻" onclick="setGenre('科幻')">科幻</button>
        <button class="chip" data-filter="剧情" onclick="setGenre('剧情')">剧情</button>
        <button class="chip" data-filter="动作" onclick="setGenre('动作')">动作</button>
        <button class="chip" data-filter="爱情" onclick="setGenre('爱情')">爱情</button>
        <button class="chip" data-filter="悬疑" onclick="setGenre('悬疑')">悬疑</button>
        <button class="chip" data-filter="动画" onclick="setGenre('动画')">动画</button>
        <button class="chip" data-filter="犯罪" onclick="setGenre('犯罪')">犯罪</button>
      </div>

      <div class="movie-grid" id="movies-list"></div>

      <div style="display: flex; justify-content: center; margin-top: 48px; gap: 8px;" id="pagination">
        <button class="btn btn-ghost btn-sm" onclick="changePage(-1)">上一页</button>
        <span style="display: flex; align-items: center; padding: 0 16px; color: var(--text-secondary); font-size: 14px;">第 <strong id="page-num" style="color: var(--text-primary); margin: 0 4px;">1</strong> 页</span>
        <button class="btn btn-ghost btn-sm" onclick="changePage(1)">下一页</button>
      </div>
    </main>

    <footer class="app-footer">
      <p>CineMatch · 电影推荐系统</p>
    </footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    let currentGenre = 'all';
    let currentPageNum = 1;
    let searchQuery = '';
    let sortBy = 'rating';

    function renderMovies() {
      let filtered = movies.filter(m => {
        const matchGenre = currentGenre === 'all' || m.genres.includes(currentGenre);
        const matchSearch = !searchQuery || m.title.includes(searchQuery) || m.originalTitle.toLowerCase().includes(searchQuery.toLowerCase());
        return matchGenre && matchSearch;
      });

      filtered.sort((a, b) => {
        if (sortBy === 'rating') return b.rating - a.rating;
        if (sortBy === 'year') return b.year - a.year;
        if (sortBy === 'title') return a.title.localeCompare(b.title);
        return 0;
      });

      const perPage = 8;
      const start = (currentPageNum - 1) * perPage;
      const pageItems = filtered.slice(start, start + perPage);

      document.getElementById('movies-list').innerHTML = pageItems.map(m => createMovieCard(m)).join('');
      document.getElementById('page-num').textContent = currentPageNum;
    }

    function setGenre(genre) {
      currentGenre = genre;
      currentPageNum = 1;
      document.querySelectorAll('#genre-filters .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.filter === genre);
      });
      renderMovies();
    }

    function handleSearch(val) {
      searchQuery = val;
      currentPageNum = 1;
      renderMovies();
    }

    function handleSort(val) {
      sortBy = val;
      renderMovies();
    }

    function changePage(delta) {
      currentPageNum = Math.max(1, currentPageNum + delta);
      renderMovies();
    }

    renderMovies();
  </script>
</body>
</html>
