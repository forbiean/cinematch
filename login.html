<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — CineMatch</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./index.html">
          <div class="brand-mark">C</div>
          CineMatch
        </a>
        <ul class="nav-links">
          <li><a href="./index.html">首页</a></li>
          <li><a href="./movies.html">电影</a></li>
          <li><a href="./recommendations.html">推荐</a></li>
          <li><a href="./profile.html">我的</a></li>
          <li><a href="./admin.html">后台</a></li>
        </ul>
        <div class="nav-user">
          <a href="./login.html" class="btn btn-ghost btn-sm">登录</a>
          <a href="./profile.html" class="avatar">L</a>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div style="max-width: 400px; margin: 80px auto; padding: 40px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle);">
        <div style="text-align: center; margin-bottom: 32px;">
          <div class="brand-mark" style="margin: 0 auto 16px; width: 48px; height: 48px; font-size: 24px;">C</div>
          <h2 style="font-size: 24px;">欢迎回来</h2>
          <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px;">登录以同步你的评分和收藏</p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">邮箱</label>
            <input type="email" value="user@example.com" style="width: 100%; padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none;">
          </div>
          <div>
            <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">密码</label>
            <input type="password" value="password" style="width: 100%; padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none;">
          </div>
          <a href="./index.html" class="btn btn-primary" style="width: 100%; margin-top: 8px; text-align: center; text-decoration: none;">登录</a>
          <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 8px;">还没有账号？<a href="#" style="color: var(--accent-gold); text-decoration: none;">立即注册</a></p>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>CineMatch · 电影推荐系统</p>
    </footer>
  </div>

  <script src="js/common.js"></script>
</body>
</html>
