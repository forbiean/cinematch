<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 — CineMatch</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./index.html">
          <div class="brand-mark">C</div>
          CineMatch
        </a>
        <ul class="nav-links">
          <li><a href="./index.html">首页</a></li>
          <li><a href="./movies.html">电影</a></li>
          <li><a href="./recommendations.html">推荐</a></li>
          <li><a href="./profile.html" class="active">我的</a></li>
          <li><a href="./admin.html">后台</a></li>
        </ul>
        <div class="nav-user">
          <a href="./login.html" class="btn btn-ghost btn-sm">登录</a>
          <a href="./profile.html" class="avatar">L</a>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div style="padding: 40px 0 24px;">
        <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
          <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-crimson), #8e2de2); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700;">L</div>
          <div>
            <h1 style="font-size: 32px;">Leo Chen</h1>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 4px;">加入于 2024年3月 · 电影爱好者</p>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin: 32px 0;">
        <div class="card" style="padding: 20px; text-align: center;">
          <div style="font-size: 28px; font-weight: 700; color: var(--accent-gold); font-family: 'Playfair Display', serif;">42</div>
          <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">已评分</div>
        </div>
        <div class="card" style="padding: 20px; text-align: center;">
          <div style="font-size: 28px; font-weight: 700; color: var(--accent-gold); font-family: 'Playfair Display', serif;">18</div>
          <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">收藏</div>
        </div>
        <div class="card" style="padding: 20px; text-align: center;">
          <div style="font-size: 28px; font-weight: 700; color: var(--accent-gold); font-family: 'Playfair Display', serif;">7.2</div>
          <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">平均评分</div>
        </div>
        <div class="card" style="padding: 20px; text-align: center;">
          <div style="font-size: 28px; font-weight: 700; color: var(--accent-gold); font-family: 'Playfair Display', serif;">科幻</div>
          <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">最爱类型</div>
        </div>
      </div>

      <div style="margin-top: 48px;">
        <div class="section-header">
          <h2 class="section-title" style="font-size: 22px;">我的评分</h2>
        </div>
        <div id="profile-ratings"></div>
      </div>

      <div style="margin-top: 48px;">
        <div class="section-header">
          <h2 class="section-title" style="font-size: 22px;">我的收藏</h2>
        </div>
        <div class="movie-grid" id="profile-favorites"></div>
      </div>

      <div style="margin-top: 48px;">
        <div class="section-header">
          <h2 class="section-title" style="font-size: 22px;">偏好标签</h2>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;" id="profile-tags"></div>
      </div>
    </main>

    <footer class="app-footer">
      <p>CineMatch · 电影推荐系统</p>
    </footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById('profile-ratings').innerHTML = profileRatings.map(pr => `
      <div style="display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border-subtle);">
        <a href="movie-detail.html?id=${pr.movie.id}">
          <img src="${pr.movie.poster}" style="width: 48px; height: 72px; object-fit: cover; border-radius: var(--radius-sm);" alt="${pr.movie.title}">
        </a>
        <div style="flex: 1;">
          <a href="movie-detail.html?id=${pr.movie.id}" style="font-weight: 600; color: var(--text-primary); text-decoration: none;">${pr.movie.title}</a>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${pr.movie.year} · ${pr.movie.genres.join('/')}</div>
        </div>
        <div style="text-align: right;">
          <div style="color: var(--accent-gold); font-size: 16px;">${'★'.repeat(pr.rating)}${'☆'.repeat(5 - pr.rating)}</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${pr.date}</div>
        </div>
      </div>
    `).join('');

    document.getElementById('profile-favorites').innerHTML = profileFavorites.map(m => createMovieCard(m)).join('');

    document.getElementById('profile-tags').innerHTML = profileTags.map(t => `
      <div style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-elevated); border-radius: 20px; border: 1px solid var(--border-subtle);">
        <span style="font-size: 14px; font-weight: 500;">${t.name}</span>
        <span style="font-size: 12px; color: var(--text-muted);">${t.count}部</span>
      </div>
    `).join('');
  </script>
</body>
</html>
