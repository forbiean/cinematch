<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个性化推荐 — CineMatch</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <div class="nav-inner">
        <a class="brand" href="./index.html">
          <div class="brand-mark">C</div>
          CineMatch
        </a>
        <ul class="nav-links">
          <li><a href="./index.html">首页</a></li>
          <li><a href="./movies.html">电影</a></li>
          <li><a href="./recommendations.html" class="active">推荐</a></li>
          <li><a href="./profile.html">我的</a></li>
          <li><a href="./admin.html">后台</a></li>
        </ul>
        <div class="nav-user">
          <a href="./login.html" class="btn btn-ghost btn-sm">登录</a>
          <a href="./profile.html" class="avatar">L</a>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div style="padding: 40px 0 24px;">
        <h1 class="section-title">个性化推荐</h1>
        <p class="section-sub">基于你的评分与收藏，为你精选的影片</p>
      </div>

      <div style="background: var(--accent-crimson-soft); border: 1px solid rgba(192,57,43,0.2); border-radius: var(--radius-md); padding: 20px 24px; margin-bottom: 32px; display: flex; align-items: center; gap: 16px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-crimson)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
        <div>
          <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">推荐策略：标签偏好 + 热门加权</div>
          <div style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">你近期给高分的科幻与剧情标签影片较多，已优先匹配同类内容。</div>
        </div>
      </div>

      <div id="recommendation-list"></div>
    </main>

    <footer class="app-footer">
      <p>CineMatch · 电影推荐系统</p>
    </footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById('recommendation-list').innerHTML = recommendations.map((rec) => {
      const movie = movies.find(m => m.id === rec.movieId);
      const stars = '★'.repeat(Math.floor(movie.rating / 2)) + '☆'.repeat(5 - Math.floor(movie.rating / 2));
      return `
        <div class="card" style="display: grid; grid-template-columns: 140px 1fr; gap: 24px; padding: 20px; margin-bottom: 16px; cursor: pointer;" onclick="location.href='movie-detail.html?id=${movie.id}'">
          <div style="border-radius: var(--radius-sm); overflow: hidden; aspect-ratio: 2/3;">
            <img src="${movie.poster}" style="width: 100%; height: 100%; object-fit: cover;" alt="${movie.title}">
          </div>
          <div style="display: flex; flex-direction: column; justify-content: center;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
              <h3 style="font-size: 20px; font-family: 'Noto Sans SC', sans-serif;">${movie.title}</h3>
              <span class="tag-pill" style="background: var(--accent-gold); color: #0a0e17; border-color: var(--accent-gold); font-weight: 600;">匹配度 ${(rec.score * 100).toFixed(0)}%</span>
            </div>
            <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.6;">${movie.summary.substring(0, 80)}...</p>
            <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
              <span style="font-size: 13px; color: var(--accent-gold);">${stars} ${movie.rating}</span>
              <span style="font-size: 13px; color: var(--text-muted);">${movie.year}</span>
              <span style="font-size: 13px; color: var(--text-muted);">${movie.genres.join(' / ')}</span>
            </div>
            <div style="margin-top: 12px; padding: 10px 14px; background: var(--accent-crimson-soft); border-radius: var(--radius-sm); border-left: 3px solid var(--accent-crimson);">
              <span style="font-size: 13px; color: var(--text-secondary);">推荐理由：${rec.reason}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  </script>
</body>
</html>
