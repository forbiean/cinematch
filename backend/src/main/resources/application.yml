server:
  port: 8080

spring:
  application:
    name: cinematch-backend
  datasource:
    url: jdbc:mysql://localhost:3306/cinematch?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
