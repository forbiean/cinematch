spring:
  datasource:
    url: jdbc:h2:mem:cinematch_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

app:
  jwt:
    secret: cinematch-test-secret-key-cinematch-test-secret-key
    expire-seconds: 604800

